# ─── Upstream services ────────────────────────────────────────────────────────
upstream api     { server api:3000; }
upstream admin   { server admin:80; }
upstream crm     { server crm:80; }

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── Admin panel — admin.xmasistent.uz ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.xmasistent.uz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── CRM app — xmasistent.uz (tenant CRM + client portal) ────────────────────
server {
    listen 443 ssl;
    server_name xmasistent.uz *.xmasistent.uz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    # API proxy — routes /api/* to NestJS
    location /api/ {
        proxy_pass http://api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Uploaded files — served from API container volume
    location /uploads/ {
        proxy_pass http://api/uploads/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # CRM SPA
    location / {
        proxy_pass http://crm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
