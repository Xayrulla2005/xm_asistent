version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xm_postgres
    environment:
      POSTGRES_USER: xm_user
      POSTGRES_PASSWORD: xm_password
      POSTGRES_DB: xm_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xm_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: