version: '3.8'

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-xm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xm_password}
      POSTGRES_DB:       ${DB_NAME:-xm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (NestJS) ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: xm_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_HOST:    postgres
      DB_PORT:    "5432"
      REDIS_URL:  redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Admin panel (React → Nginx) ─────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: xm_admin
    restart: unless-stopped
    depends_on:
      - api

  # ─── CRM app (React → Nginx) ─────────────────────────────────────────────
  crm:
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
    container_name: xm_crm
    restart: unless-stopped
    depends_on:
      - api

  # ─── Reverse proxy (Nginx + SSL) ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: xm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - uploads:/app/uploads:ro
    depends_on:
      - api
      - admin
      - crm

volumes:
  postgres_data:
  redis_data:
  uploads:
